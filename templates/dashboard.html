<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Monitoring Dashboard</title>
    <style>
      :root {
        --bg: #f5f7fb;
        --surface: #ffffff;
        --text: #18202a;
        --muted: #5e6b7d;
        --line: #dbe2ea;
        --accent: #0a7d5a;
        --warn: #b9770e;
        --danger: #b03a2e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: radial-gradient(
          circle at top right,
          #e7eef8 0%,
          var(--bg) 45%
        );
        color: var(--text);
      }

      .wrap {
        max-width: 1100px;
        margin: 0 auto;
        padding: 24px 16px 40px;
      }

      .head {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        flex-wrap: wrap;
        gap: 8px;
      }

      .head h1 {
        margin: 0;
        font-size: 1.5rem;
      }

      .head p {
        margin: 4px 0 0;
        color: var(--muted);
      }

      .cards {
        margin-top: 18px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 12px;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 12px;
      }

      .card .label {
        color: var(--muted);
        font-size: 0.85rem;
        margin-bottom: 6px;
      }

      .card .value {
        font-size: 1.5rem;
        font-weight: 700;
      }

      .section {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 12px;
        margin-top: 16px;
        padding: 12px;
      }

      .section h2 {
        margin: 0 0 10px;
        font-size: 1.05rem;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.92rem;
      }

      th,
      td {
        text-align: left;
        padding: 8px 6px;
        border-bottom: 1px solid var(--line);
        vertical-align: top;
      }

      .status-ok {
        color: var(--accent);
        font-weight: 700;
      }

      .status-degraded {
        color: var(--warn);
        font-weight: 700;
      }

      .status-critical {
        color: var(--danger);
        font-weight: 700;
      }

      .muted {
        color: var(--muted);
      }

      @media (max-width: 700px) {
        th:nth-child(4),
        td:nth-child(4),
        th:nth-child(5),
        td:nth-child(5) {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="head">
        <div>
          <h1>Reseau Monitoring Dashboard</h1>
          <p>Extension web optionnelle, protocole TP inchange.</p>
        </div>
        <div class="muted">Derniere MAJ: <span id="lastUpdate">-</span></div>
      </div>

      <div class="cards">
        <div class="card">
          <div class="label">Agents actifs</div>
          <div class="value" id="activeAgents">0</div>
        </div>
        <div class="card">
          <div class="label">CPU moyenne (%)</div>
          <div class="value" id="avgCpu">0.00</div>
        </div>
        <div class="card">
          <div class="label">RAM moyenne (MB)</div>
          <div class="value" id="avgRam">0.00</div>
        </div>
        <div class="card">
          <div class="label">Total REPORT</div>
          <div class="value" id="totalReports">0</div>
        </div>
        <div class="card">
          <div class="label">Errors recents</div>
          <div class="value" id="recentErrors">0</div>
        </div>
      </div>

      <div class="section">
        <h2>Agents</h2>
        <table>
          <thead>
            <tr>
              <th>Agent</th>
              <th>Host</th>
              <th>Protocole</th>
              <th>CPU %</th>
              <th>RAM MB</th>
              <th>Health</th>
              <th>Health Errors</th>
            </tr>
          </thead>
          <tbody id="agentsBody"></tbody>
        </table>
      </div>

      <div class="section">
        <h2>Alertes recentes</h2>
        <table>
          <thead>
            <tr>
              <th>Timestamp</th>
              <th>Type</th>
              <th>Agent</th>
              <th>Message</th>
            </tr>
          </thead>
          <tbody id="alertsBody"></tbody>
        </table>
      </div>
    </div>

    <script>
      function statusClass(status) {
        const normalized = (status || "").toUpperCase();
        if (normalized === "CRITICAL") return "status-critical";
        if (normalized === "DEGRADED") return "status-degraded";
        return "status-ok";
      }

      function renderOverview(data) {
        const summary = data.summary || {};
        document.getElementById("activeAgents").textContent =
          summary.active_agents ?? 0;
        document.getElementById("avgCpu").textContent = Number(
          summary.avg_cpu_pct ?? 0,
        ).toFixed(2);
        document.getElementById("avgRam").textContent = Number(
          summary.avg_ram_mb ?? 0,
        ).toFixed(2);
        document.getElementById("totalReports").textContent =
          summary.total_reports ?? 0;
        document.getElementById("recentErrors").textContent =
          summary.recent_error_count ?? 0;
        document.getElementById("lastUpdate").textContent =
          data.timestamp || "-";

        const agentsBody = document.getElementById("agentsBody");
        const agents = data.agents || [];
        if (agents.length === 0) {
          agentsBody.innerHTML =
            '<tr><td colspan="7" class="muted">Aucun agent actif.</td></tr>';
        } else {
          agentsBody.innerHTML = agents
            .map((agent) => {
              const health = agent.health || {};
              const status = health.status || "OK";
              return `
            <tr>
              <td>${agent.agent_id || "-"}</td>
              <td>${agent.hostname || "-"}</td>
              <td>${agent.protocol || "-"}</td>
              <td>${Number(agent.cpu_pct || 0).toFixed(1)}</td>
              <td>${Number(agent.ram_mb || 0).toFixed(0)}</td>
              <td class="${statusClass(status)}">${status}</td>
              <td>${health.error_count ?? 0}</td>
            </tr>
          `;
            })
            .join("");
        }

        const alertsBody = document.getElementById("alertsBody");
        const alerts = data.alerts || [];
        if (alerts.length === 0) {
          alertsBody.innerHTML =
            '<tr><td colspan="4" class="muted">Aucune alerte recente.</td></tr>';
        } else {
          alertsBody.innerHTML = alerts
            .slice()
            .reverse()
            .map(
              (alert) => `
          <tr>
            <td>${alert.timestamp || "-"}</td>
            <td>${alert.type || "-"}</td>
            <td>${alert.agent_id || "-"}</td>
            <td>${alert.message || "-"}</td>
          </tr>
        `,
            )
            .join("");
        }
      }

      async function refresh() {
        try {
          const response = await fetch("/api/overview?alert_limit=25", {
            cache: "no-store",
          });
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }
          const data = await response.json();
          renderOverview(data);
        } catch (error) {
          console.error(error);
        }
      }

      refresh();
      setInterval(refresh, 3000);
    </script>
  </body>
</html>
